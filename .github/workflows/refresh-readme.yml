name: Refresh public repositories

# Keeps the "Open Source on GitHub" section of the profile README in sync
# with the account's PUBLIC repositories. Runs daily and on demand.
# The generator reads only the public `/users/{user}/repos` endpoint, so
# private repositories can never be added to the profile.

on:
  schedule:
    - cron: "17 6 * * *"   # daily, 06:17 UTC
  workflow_dispatch:        # manual "Run workflow" button

permissions:
  contents: write

concurrency:
  group: refresh-readme
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Regenerate public repositories section
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_USER: ${{ github.repository_owner }}
        run: python .github/scripts/update_public_repos.py

      - name: Commit changes if any
        run: |
          if [[ -n "$(git status --porcelain README.md)" ]]; then
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add README.md
            git commit -m "chore: refresh public repositories [skip ci]"
            git push
          else
            echo "README already up to date."
          fi
